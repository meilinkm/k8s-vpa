---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: vpa-reflector
  namespace: reflector # namespace must match the object being targeted in targetRef below
spec:
  targetRef:
    apiVersion: "apps/v1"
    kind: Deployment
    name: reflector
  updatePolicy:
    updateMode: "Off"
